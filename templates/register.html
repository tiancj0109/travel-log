{% extends "base.html" %}

{% block title %}注册{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card">
        <h1 class="text-center mb-3"
            style="background: var(--primary); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">
            ✈️ Travel Log
        </h1>
        <h2 class="text-center mb-4" style="font-size: 1.5rem;">注册</h2>

        <form method="POST" action="{{ url_for('register') }}" id="registerForm">
            <div class="form-group">
                <label class="form-label" for="username">用户名</label>
                <input type="text" id="username" name="username" class="form-input" required autofocus
                    pattern="[\u4e00-\u9fa5a-zA-Z0-9]+" title="只能包含中文、英文和数字" minlength="2" maxlength="50"
                    placeholder="中文、英文、数字，2-50字符">
                <small style="color: var(--text-muted); font-size: 0.875rem;">
                    只能包含中文、英文和数字
                </small>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">密码</label>
                <input type="password" id="password" name="password" class="form-input" required minlength="1"
                    placeholder="请输入密码">
            </div>

            <div class="form-group">
                <label class="form-label" for="confirm_password">确认密码</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-input" required
                    placeholder="请再次输入密码">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">
                注册
            </button>
        </form>

        <div class="text-center mt-3">
            <span style="color: var(--text-secondary);">已有账号？</span>
            <a href="{{ url_for('login') }}" style="color: var(--primary-light); text-decoration: none;">
                立即登录
            </a>
        </div>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', function (e) {
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm_password').value;

        if (password !== confirmPassword) {
            e.preventDefault();
            alert('两次输入的密码不一致！');
        }
    });
</script>
{% endblock %}
