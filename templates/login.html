{% extends "base.html" %}

{% block title %}登录{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card">
        <h1 class="text-center mb-3"
            style="background: var(--primary); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">
            ✈️ Travel Log
        </h1>
        <h2 class="text-center mb-4" style="font-size: 1.5rem;">登录</h2>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label class="form-label" for="username">用户名</label>
                <input type="text" id="username" name="username" class="form-input" required autofocus
                    placeholder="请输入用户名">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">密码</label>
                <input type="password" id="password" name="password" class="form-input" required placeholder="请输入密码">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">
                登录
            </button>
        </form>

        <div class="text-center mt-3">
            <span style="color: var(--text-secondary);">还没有账号？</span>
            <a href="{{ url_for('register') }}" style="color: var(--primary-light); text-decoration: none;">
                立即注册
            </a>
        </div>
    </div>
</div>
{% endblock %}
