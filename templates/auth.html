{% extends "base.html" %}

{% block title %}登录 / 注册{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">✈️ 旅行记录</h1>

        <div class="tab-container">
            <button class="tab-btn active" data-tab="login">登录</button>
            <button class="tab-btn" data-tab="register">注册</button>
        </div>

        <!-- 登录表单 -->
        <div id="login-form" class="form-container active">
            <input type="text" id="login-username" placeholder="用户名" class="input-field">
            <input type="password" id="login-password" placeholder="密码" class="input-field">
            <button onclick="handleLogin()" class="btn-primary">登录</button>
        </div>

        <!-- 注册表单 -->
        <div id="register-form" class="form-container">
            <input type="text" id="register-username" placeholder="用户名（仅中文、英文、数字）" class="input-field">
            <input type="password" id="register-password" placeholder="密码" class="input-field">
            <input type="password" id="register-password-confirm" placeholder="确认密码" class="input-field">
            <button onclick="handleRegister()" class="btn-primary">注册</button>
        </div>

        <div id="message" class="message"></div>
    </div>
</div>

<script>
    // Tab切换
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const tab = btn.dataset.tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.form-container').forEach(f => f.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(`${tab}-form`).classList.add('active');
            document.getElementById('message').textContent = '';
        });
    });

    async function handleLogin() {
        const username = document.getElementById('login-username').value;
        const password = document.getElementById('login-password').value;

        if (!username || !password) {
            showMessage('请填写所有字段', 'error');
            return;
        }

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();
            if (data.success) {
                window.location.href = '/dashboard';
            } else {
                showMessage(data.message, 'error');
            }
        } catch (error) {
            showMessage('登录失败，请重试', 'error');
        }
    }

    async function handleRegister() {
        const username = document.getElementById('register-username').value;
        const password = document.getElementById('register-password').value;
        const confirmPassword = document.getElementById('register-password-confirm').value;

        if (!username || !password || !confirmPassword) {
            showMessage('请填写所有字段', 'error');
            return;
        }

        if (password !== confirmPassword) {
            showMessage('两次密码不一致', 'error');
            return;
        }

        try {
            const response = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();
            if (data.success) {
                showMessage('注册成功，请登录', 'success');
                // 切换到登录标签
                document.querySelector('.tab-btn[data-tab="login"]').click();
            } else {
                showMessage(data.message, 'error');
            }
        } catch (error) {
            showMessage('注册失败，请重试', 'error');
        }
    }

    function showMessage(msg, type) {
        const messageEl = document.getElementById('message');
        messageEl.textContent = msg;
        messageEl.className = `message ${type}`;
    }
</script>
{% endblock %}
